function renderBuilder(root) {
  const state = readState();
  root.innerHTML = `
    <div class="header-bar">
      <div>
        <h1>8-BIT GAME MAKER</h1>
        <div class="subtitle">Pick your adventure. Remix. Share. Publish your own engine.</div>
      </div>
      <div class="button-row">
        <button id="btn-duel">1v1 Duel</button>
        <button id="btn-play-direct">Play »</button>
      </div>
    </div>
    <div class="builder">
      <div class="slots" id="slots"></div>
      <div class="preview-panel">
        <h3>Live Preview</h3>
        <div class="preview-canvas-wrap">
          <canvas id="preview" width="340" height="220"></canvas>
        </div>
        <div class="preview-info" id="preview-info"></div>
        <div class="button-row">
          <button class="primary" id="btn-publish">PUBLISH &amp; SHARE</button>
          <button id="btn-test">Test Play</button>
        </div>
      </div>
    </div>
  `;

  const slotsEl = root.querySelector('#slots');
  const previewCanvas = root.querySelector('#preview');
  const previewInfo = root.querySelector('#preview-info');

  function slotHTML(label, key, options, renderOption, previewable) {
    return `
      <div class="slot">
        <div class="slot-header">
          <span class="slot-label">${label}</span>
          ${previewable ? `<button class="preview-btn" data-preview="${key}">&#9658; Preview</button>` : ''}
        </div>
        <div class="slot-options">
          ${options.map((o, i) => `
            <div class="chip ${state[key] === i ? 'selected' : ''}" data-key="${key}" data-idx="${i}">
              ${renderOption(o, i)}
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  function textSlotHTML(label, key, placeholder) {
    return `
      <div class="slot">
        <div class="slot-label">${label}</div>
        <input type="text" data-textkey="${key}" value="${(state[key] || '').replace(/"/g, '&quot;')}" maxlength="24" placeholder="${placeholder}">
      </div>
    `;
  }

  function objectiveSlotHTML() {
    const wc = WIN_CONDITIONS[state.c];
    return `
      <div class="slot" data-slot="c">
        <div class="slot-header">
          <span class="slot-label">Objective</span>
          <button class="preview-btn" data-preview="c">&#9658; Preview</button>
        </div>
        <div class="slot-options">
          ${WIN_CONDITIONS.map((o, i) => `
            <div class="chip ${state.c === i ? 'selected' : ''}" data-key="c" data-idx="${i}">
              ${o.name}
            </div>
          `).join('')}
        </div>
        <div class="target-stepper">
          <span class="target-stepper-label">Target</span>
          <button class="step-btn" data-step="-1" ${state.ct <= wc.min ? 'disabled' : ''}>&minus;</button>
          <span class="target-val">${state.ct}</span>
          <button class="step-btn" data-step="1" ${state.ct >= wc.max ? 'disabled' : ''}>+</button>
          <span class="target-unit">${wc.unit}</span>
        </div>
      </div>
    `;
  }

  slotsEl.innerHTML =
    textSlotHTML('Game Title', 't', 'Untitled Adventure') +
    textSlotHTML('Hero Name', 'hn', 'Hero') +
    slotHTML('Hero', 'h', HEROES, o => o.name, true) +
    slotHTML('Environment', 'e', ENVIRONMENTS, o => o.name, true) +
    slotHTML('Enemy', 'n', ENEMIES, o => o.name, true) +
    slotHTML('Weapon', 'w', WEAPONS, o => o.name, true) +
    slotHTML('Music', 'm', MUSIC_TRACKS, o => o.name, true) +
    objectiveSlotHTML() +
    slotHTML('Difficulty', 'd', DIFFICULTIES, o => o.name, true) +
    slotHTML('Color Palette', 'p', PALETTES, o => o.name, true);

  function refresh() {
    stopPreviewAnim();
    renderPreview(previewCanvas, state);
    const hero = HEROES[state.h], env = ENVIRONMENTS[state.e], enemy = ENEMIES[state.n];
    const weap = WEAPONS[state.w], wc = WIN_CONDITIONS[state.c], diff = DIFFICULTIES[state.d];
    previewInfo.innerHTML = `
      <strong>${state.hn || 'Hero'}</strong> the <strong>${hero.name}</strong> wields a <strong>${weap.name}</strong><br>
      In the <strong>${env.name}</strong>, fighting <strong>${enemy.name}</strong><br>
      Goal: <strong>${objectiveName(wc, state.ct)}</strong> · <strong>${diff.name}</strong> · <strong>${MUSIC_TRACKS[state.m].name}</strong> music
    `;
    root.querySelectorAll('.chip').forEach(chip => {
      const key = chip.dataset.key, idx = Number(chip.dataset.idx);
      chip.classList.toggle('selected', state[key] === idx);
    });
    root.querySelectorAll('.preview-btn').forEach(btn => btn.classList.remove('active'));
    // update objective stepper (value, unit, disabled state)
    const valEl = root.querySelector('.target-val');
    const unitEl = root.querySelector('.target-unit');
    if (valEl) valEl.textContent = state.ct;
    if (unitEl) unitEl.textContent = wc.unit;
    const stepBtns = root.querySelectorAll('.step-btn');
    if (stepBtns.length >= 2) {
      stepBtns[0].disabled = state.ct <= wc.min;
      stepBtns[1].disabled = state.ct >= wc.max;
    }
  }

  slotsEl.addEventListener('click', (e) => {
    const stepBtn = e.target.closest('.step-btn');
    if (stepBtn && !stepBtn.disabled) {
      const wc = WIN_CONDITIONS[state.c];
      const delta = Number(stepBtn.dataset.step) * wc.step;
      state.ct = clamp(state.ct + delta, wc.min, wc.max);
      refresh();
      return;
    }
    const previewBtn = e.target.closest('.preview-btn');
    if (previewBtn) {
      const kind = previewBtn.dataset.preview;
      if (activePreviewKind === kind) {
        stopPreviewAnim();
        renderPreview(previewCanvas, state);
        previewBtn.classList.remove('active');
        return;
      }
      root.querySelectorAll('.preview-btn').forEach(b => b.classList.remove('active'));
      previewBtn.classList.add('active');
      Audio.ensure();
      runPreviewAnim(previewCanvas, state, kind, () => {
        previewBtn.classList.remove('active');
      });
      return;
    }
    const chip = e.target.closest('.chip');
    if (!chip) return;
    const key = chip.dataset.key;
    const idx = Number(chip.dataset.idx);
    state[key] = idx;
    if (key === 'c') {
      state.ct = WIN_CONDITIONS[idx].target;
      const oldSlot = root.querySelector('[data-slot="c"]');
      if (oldSlot) {
        const tmp = document.createElement('div');
        tmp.innerHTML = objectiveSlotHTML();
        oldSlot.replaceWith(tmp.firstElementChild);
      }
    }
    refresh();
  });

  slotsEl.addEventListener('input', (e) => {
    if (e.target.dataset.textkey) {
      const key = e.target.dataset.textkey;
      state[key] = e.target.value.slice(0, 24);
      refresh();
    }
  });

  root.querySelector('#btn-publish').addEventListener('click', () => {
    stopPreviewAnim();
    const url = buildShareURL(state);
    renderShare(root, state, url);
  });
  root.querySelector('#btn-test').addEventListener('click', () => {
    stopPreviewAnim();
    renderPlay(root, state);
  });
  root.querySelector('#btn-play-direct').addEventListener('click', () => {
    stopPreviewAnim();
    renderPlay(root, state);
  });
  root.querySelector('#btn-duel').addEventListener('click', () => {
    stopPreviewAnim();
    renderDuelSetup(root);
  });

  refresh();
}

/* ========================================================================
   PLAY SCREEN
   ======================================================================== */

let currentGame = null;
let currentDuel = null;
let currentPairingRaf = null;
let currentPairingKbKeys = null;
let currentPairingKbKeyDown = null;
let currentPairingKbKeyUp = null;
let currentSplashTimer = null;
let currentSplashStartHandler = null;
let currentSplashCanvasClick = null;
let currentSplashCanvasEl = null;
let currentSplashGamepadRaf = null;
let currentFullscreenHandler = null;

function stopCurrentPlay() {
  if (currentGame) { currentGame.stop(); currentGame = null; }
  if (currentSplashTimer) { clearInterval(currentSplashTimer); currentSplashTimer = null; }
  if (currentSplashGamepadRaf) { cancelAnimationFrame(currentSplashGamepadRaf); currentSplashGamepadRaf = null; }
  if (currentSplashStartHandler) {
    window.removeEventListener('keydown', currentSplashStartHandler);
    currentSplashStartHandler = null;
  }
  if (currentSplashCanvasClick && currentSplashCanvasEl) {
    currentSplashCanvasEl.removeEventListener('click', currentSplashCanvasClick);
    currentSplashCanvasClick = null;
    currentSplashCanvasEl = null;
  }
  if (currentFullscreenHandler) {
    document.removeEventListener('fullscreenchange', currentFullscreenHandler);
    currentFullscreenHandler = null;
  }
  if (currentDuel) { currentDuel.stop(); currentDuel = null; }
  if (currentPairingRaf) { cancelAnimationFrame(currentPairingRaf); currentPairingRaf = null; }
  if (currentPairingKbKeyDown) {
    window.removeEventListener('keydown', currentPairingKbKeyDown);
    window.removeEventListener('keyup', currentPairingKbKeyUp);
    currentPairingKbKeyDown = null;
    currentPairingKbKeyUp = null;
    currentPairingKbKeys = null;
  }
  if (document.fullscreenElement) document.exitFullscreen();
  Audio.stopMusic();
}

function goToBuilder(root, state) {
  stopCurrentPlay();
  const params = new URLSearchParams();
  for (const key of Object.keys(DEFAULT_STATE)) {
    if (key === 't' || key === 'hn') params.set(key, encodeURIComponent(state[key]));
    else params.set(key, String(state[key]));
  }
  history.replaceState(null, '', location.pathname + '?' + params.toString());
  renderBuilder(root);
}

function renderPlay(root, state) {
  stopCurrentPlay();
  root.innerHTML = `
    <div class="header-bar">
      <div>
        <h1>${escapeHTML(state.t)}</h1>
        <div class="subtitle">${escapeHTML(state.hn)} the ${HEROES[state.h].name} · ${WEAPONS[state.w].name} · ${ENVIRONMENTS[state.e].name}</div>
      </div>
      <div class="button-row">
        <button id="btn-back">« Back to builder</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-fullscreen">Fullscreen</button>
        <button id="btn-share">Publish / share</button>
      </div>
    </div>
    <div class="play-screen">
      <div class="canvas-stack">
        <canvas id="game" width="${GAME_W}" height="${GAME_H}"></canvas>
      </div>
      <div class="controls-help">
        Move: <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> or arrows
        · Attack: <kbd>Space</kbd>
        · Pause: <kbd>P</kbd>
        · Fullscreen: <kbd>F</kbd>
        · Mute: <kbd>M</kbd>
        · Restart: <kbd>R</kbd>
        <br>
        Controller: left stick / D-pad to move · any face button or right trigger to attack · <kbd>Start</kbd> to pause or restart · <kbd>Select</kbd> for fullscreen
        <span id="gp-indicator" style="display:none;color:var(--ok);margin-left:8px">&bull; controller detected</span>
      </div>
      <div class="play-footer">
        Built with <a href="?">8-Bit Game Maker</a> · <a href="?">Make your own</a>
      </div>
    </div>
  `;
  const canvas = root.querySelector('#game');
  canvas.style.filter = PALETTES[state.p].filter;

  // splash: draw title + "Press any key" overlay
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  drawEnvironment(ctx, ENVIRONMENTS[state.e], GAME_W, GAME_H, 0, null);
  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffcc22';
  ctx.font = 'bold 32px Courier New';
  ctx.fillText(state.t.toUpperCase(), GAME_W/2, GAME_H/2 - 30);
  ctx.fillStyle = '#ffffff';
  ctx.font = '14px Courier New';
  ctx.fillText(`${state.hn} the ${HEROES[state.h].name}`, GAME_W/2, GAME_H/2);
  ctx.fillStyle = '#aaaacc';
  ctx.fillText(objectiveName(WIN_CONDITIONS[state.c], state.ct), GAME_W/2, GAME_H/2 + 20);
  ctx.fillStyle = '#ffcc22';
  ctx.font = 'bold 16px Courier New';
  ctx.fillText('PRESS ANY KEY TO START', GAME_W/2, GAME_H/2 + 60);

  let started = false;
  const startGame = () => {
    if (started) return;
    started = true;
    if (currentSplashTimer) { clearInterval(currentSplashTimer); currentSplashTimer = null; }
    if (currentSplashGamepadRaf) { cancelAnimationFrame(currentSplashGamepadRaf); currentSplashGamepadRaf = null; }
    if (currentSplashStartHandler) {
      window.removeEventListener('keydown', currentSplashStartHandler);
      currentSplashStartHandler = null;
    }
    if (currentSplashCanvasClick && currentSplashCanvasEl) {
      currentSplashCanvasEl.removeEventListener('click', currentSplashCanvasClick);
      currentSplashCanvasClick = null;
      currentSplashCanvasEl = null;
    }
    currentGame = new Game(canvas, state);
    currentGame.onPauseChange = (paused) => {
      const pb = root.querySelector('#btn-pause');
      if (pb) pb.textContent = paused ? 'Resume' : 'Pause';
    };
    currentGame.start();
  };
  currentSplashStartHandler = startGame;
  currentSplashCanvasClick = startGame;
  currentSplashCanvasEl = canvas;
  window.addEventListener('keydown', startGame);
  canvas.addEventListener('click', startGame);

  // Poll gamepad during splash: any button press starts the game;
  // also reveal the "controller detected" indicator on first connection.
  const gpIndicator = root.querySelector('#gp-indicator');
  const pollSplashGamepad = () => {
    if (started) return;
    const pads = navigator.getGamepads ? navigator.getGamepads() : [];
    for (const p of pads) {
      if (!p || !p.connected) continue;
      if (gpIndicator) gpIndicator.style.display = 'inline';
      if (p.buttons.some(b => b && b.pressed)) { startGame(); return; }
      const stickMoved = (p.axes || []).some(a => Math.abs(a) > 0.5);
      if (stickMoved) { startGame(); return; }
    }
    currentSplashGamepadRaf = requestAnimationFrame(pollSplashGamepad);
  };
  pollSplashGamepad();

  // pulse the "press any key" text
  currentSplashTimer = setInterval(() => {
    if (started) return;
    drawEnvironment(ctx, ENVIRONMENTS[state.e], GAME_W, GAME_H, 0, null);
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, GAME_W, GAME_H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffcc22';
    ctx.font = 'bold 32px Courier New';
    ctx.fillText(state.t.toUpperCase(), GAME_W/2, GAME_H/2 - 30);
    ctx.fillStyle = '#ffffff';
    ctx.font = '14px Courier New';
    ctx.fillText(`${state.hn} the ${HEROES[state.h].name}`, GAME_W/2, GAME_H/2);
    ctx.fillStyle = '#aaaacc';
    ctx.fillText(objectiveName(WIN_CONDITIONS[state.c], state.ct), GAME_W/2, GAME_H/2 + 20);
    if (Math.floor(Date.now() / 500) % 2 === 0) {
      ctx.fillStyle = '#ffcc22';
      ctx.font = 'bold 16px Courier New';
      ctx.fillText('PRESS ANY KEY TO START', GAME_W/2, GAME_H/2 + 60);
    }
  }, 500);

  root.querySelector('#btn-back').addEventListener('click', () => {
    goToBuilder(root, state);
  });
  root.querySelector('#btn-share').addEventListener('click', () => {
    stopCurrentPlay();
    renderShare(root, state, buildShareURL(state));
  });
  const btnPause = root.querySelector('#btn-pause');
  btnPause.addEventListener('click', () => {
    if (currentGame) currentGame.togglePause();
  });
  const btnFullscreen = root.querySelector('#btn-fullscreen');
  const canvasStack = root.querySelector('.canvas-stack');
  btnFullscreen.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else if (canvasStack.requestFullscreen) canvasStack.requestFullscreen();
  });
  currentFullscreenHandler = () => {
    btnFullscreen.textContent = document.fullscreenElement ? 'Exit fullscreen' : 'Fullscreen';
  };
  document.addEventListener('fullscreenchange', currentFullscreenHandler);
}

      const src = await res.text();
      const escaped = src.replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
      const doc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Source &middot; 8-Bit Game Maker</title><style>body{font-family:ui-monospace,'Courier New',monospace;background:#0a0a1f;color:#ddd;padding:24px;font-size:12px;line-height:1.5}pre{white-space:pre-wrap;word-wrap:break-word;margin:0}h1{color:#ffcc00;font-size:16px;letter-spacing:2px;margin:0 0 16px;border-bottom:1px solid #444;padding-bottom:10px}</style></head><body><h1>8-BIT GAME MAKER &middot; SOURCE</h1><pre>${escaped}</pre></body></html>`;
      const blob = new Blob([doc], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      window.open(url, '_blank');
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    } catch (e) {
      alert('Could not load source. Try right-click → View Page Source on this tab.');
    }
  });
}

/* ========================================================================
   DUEL: 1v1 setup, pairing, match
   ======================================================================== */

let duelSetup = null;

function defaultDuelSetup() {
  return {
    p1: { h: 0, w: 0, hn: 'Player 1' },
    p2: { h: 1, w: 1, hn: 'Player 2' },
    e: 0, m: 0, p: 0,
  };
}

function renderDuelSetup(root) {
  stopCurrentPlay();
  if (!duelSetup) duelSetup = defaultDuelSetup();
  const setup = duelSetup;

  const chipsHTML = (opts, key, selectedIdx, renderOpt) => opts.map((o, i) => `
    <div class="chip ${selectedIdx === i ? 'selected' : ''}" data-key="${key}" data-idx="${i}">${renderOpt(o)}</div>
  `).join('');

  const playerPanel = (n) => {
    const ps = setup['p' + n];
    const keyPrefix = 'p' + n + '.';
    return `
      <div class="duel-player" data-player="${n}">
        <h3>PLAYER ${n}</h3>
        <div class="duel-field">
          <span class="slot-label">Name</span>
          <input type="text" data-textkey="${keyPrefix}hn" value="${escapeHTML(ps.hn)}" maxlength="16">
        </div>
        <div class="duel-field">
          <span class="slot-label">Hero</span>
          <div class="slot-options">${chipsHTML(HEROES, keyPrefix + 'h', ps.h, o => o.name)}</div>
        </div>
        <div class="duel-field">
          <span class="slot-label">Weapon</span>
          <div class="slot-options">${chipsHTML(WEAPONS, keyPrefix + 'w', ps.w, o => o.name)}</div>
        </div>
      </div>
    `;
  };

  root.innerHTML = `
    <div class="header-bar">
      <div>
        <h1>1v1 DUEL</h1>
        <div class="subtitle">Customize both fighters. No enemies &mdash; just you two.</div>
      </div>
      <div class="button-row">
        <button id="btn-back">&laquo; Back to builder</button>
      </div>
    </div>
    <div class="duel-players">${playerPanel(1)}${playerPanel(2)}</div>
    <div class="duel-shared">
      <div class="slot-label" style="color:var(--accent);margin-bottom:10px">SHARED</div>
      <div class="duel-shared-fields">
        <div>
          <span class="slot-label">Environment</span>
          <div class="slot-options">${chipsHTML(ENVIRONMENTS, 'e', setup.e, o => o.name)}</div>
        </div>
        <div>
          <span class="slot-label">Music</span>
          <div class="slot-options">${chipsHTML(MUSIC_TRACKS, 'm', setup.m, o => o.name)}</div>
        </div>
        <div>
          <span class="slot-label">Palette</span>
          <div class="slot-options">${chipsHTML(PALETTES, 'p', setup.p, o => o.name)}</div>
        </div>
      </div>
    </div>
    <div class="button-row" style="justify-content:center">
      <button class="primary" id="btn-duel-start">START &raquo;</button>
    </div>
  `;

  root.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    const key = chip.dataset.key;
    const idx = Number(chip.dataset.idx);
    if (key.startsWith('p1.') || key.startsWith('p2.')) {
      const [pk, field] = key.split('.');
      setup[pk][field] = idx;
    } else {
      setup[key] = idx;
    }
    root.querySelectorAll('.chip').forEach(c => {
      if (c.dataset.key === key) c.classList.toggle('selected', Number(c.dataset.idx) === idx);
    });
  });

  root.addEventListener('input', (e) => {
    const tk = e.target.dataset && e.target.dataset.textkey;
    if (!tk) return;
    const [pk, field] = tk.split('.');
    setup[pk][field] = e.target.value.slice(0, 16);
  });

  root.querySelector('#btn-back').addEventListener('click', () => {
    const state = readState();
    goToBuilder(root, state);
  });

  root.querySelector('#btn-duel-start').addEventListener('click', () => {
    renderDuelPairing(root, setup);
  });
}

function renderDuelPairing(root, setup) {
  stopCurrentPlay();

  const kbKeys = {};
  currentPairingKbKeys = kbKeys;
  currentPairingKbKeyDown = (e) => {
    kbKeys[e.key.toLowerCase()] = true;
    const k = e.key.toLowerCase();
    if ([' ', '/', "'"].includes(k)) e.preventDefault();
  };
  currentPairingKbKeyUp = (e) => { kbKeys[e.key.toLowerCase()] = false; };
  window.addEventListener('keydown', currentPairingKbKeyDown);
  window.addEventListener('keyup', currentPairingKbKeyUp);

  root.innerHTML = `
    <div class="header-bar">
      <div>
        <h1>PAIR CONTROLS</h1>
        <div class="subtitle">Each player, press any button on the controls you'll use.</div>
      </div>
      <div class="button-row">
        <button id="btn-back">&laquo; Back to setup</button>
      </div>
    </div>
    <div class="pair-screen">
      <div class="pair-slot active" id="pair-p1">
        <div class="pair-title" style="color:var(--accent)">${escapeHTML(setup.p1.hn)} (Player 1)</div>
        <div class="pair-prompt">Press any button to confirm your controls</div>
        <div class="pair-hint">Keyboard: WASD + F/Space &nbsp;or&nbsp; IJKL + ' or / &nbsp;&mdash; or any gamepad button / stick</div>
      </div>
      <div class="pair-slot" id="pair-p2">
        <div class="pair-title" style="color:var(--accent-2)">${escapeHTML(setup.p2.hn)} (Player 2)</div>
        <div class="pair-prompt">Waiting for Player 1...</div>
        <div class="pair-hint" id="pair-p2-hint">Keyboard: WASD + F/Space &nbsp;or&nbsp; IJKL + ' or / &nbsp;&mdash; or any gamepad button / stick</div>
      </div>
      <div id="pair-error" class="pair-error"></div>
    </div>
  `;

  root.querySelector('#btn-back').addEventListener('click', () => {
    renderDuelSetup(root);
  });

  let phase = 'p1';
  let ctrl1 = null, ctrl2 = null;
  const slot1 = root.querySelector('#pair-p1');
  const slot2 = root.querySelector('#pair-p2');
  const errorEl = root.querySelector('#pair-error');

  const pollPair = () => {
    // Require buttons to be fully released between detections to avoid bleed-through
    if (phase === 'p1') {
      const c = detectController(kbKeys, null);
      if (c) {
        ctrl1 = c;
        slot1.classList.remove('active');
        slot1.classList.add('confirmed');
        slot1.querySelector('.pair-prompt').remove();
        const hint = slot1.querySelector('.pair-hint');
        if (hint) hint.remove();
        const dev = document.createElement('div');
        dev.className = 'pair-device';
        dev.textContent = '\u2713 ' + c.label;
        slot1.appendChild(dev);
        phase = 'p1-wait-release';
      }
    } else if (phase === 'p1-wait-release') {
      // Wait until Player 1's input is released before listening for Player 2
      const stillActive = isControllerActive(ctrl1, kbKeys);
      if (!stillActive) {
        phase = 'p2';
        slot2.classList.add('active');
        slot2.querySelector('.pair-prompt').textContent = 'Press any button to confirm your controls';
        const hint = slot2.querySelector('#pair-p2-hint');
        if (hint) {
          let kb;
          if (ctrl1.id === 'kb-wasd') kb = "Keyboard: IJKL + ' or /";
          else if (ctrl1.id === 'kb-ijkl') kb = 'Keyboard: WASD + F/Space';
          else kb = "Keyboard: WASD + F/Space &nbsp;or&nbsp; IJKL + ' or /";
          hint.innerHTML = kb + ' &nbsp;&mdash; or any gamepad button / stick';
        }
      }
    } else if (phase === 'p2') {
      const c = detectController(kbKeys, ctrl1.id);
      if (c) {
        ctrl2 = c;
        slot2.classList.remove('active');
        slot2.classList.add('confirmed');
        slot2.querySelector('.pair-prompt').remove();
        const dev = document.createElement('div');
        dev.className = 'pair-device';
        dev.textContent = '\u2713 ' + c.label;
        slot2.appendChild(dev);
        phase = 'done';
        // brief delay so player sees the confirmation, then start match
        setTimeout(() => {
          if (currentPairingRaf) { cancelAnimationFrame(currentPairingRaf); currentPairingRaf = null; }
          if (currentPairingKbKeyDown) {
            window.removeEventListener('keydown', currentPairingKbKeyDown);
            window.removeEventListener('keyup', currentPairingKbKeyUp);
            currentPairingKbKeyDown = null; currentPairingKbKeyUp = null; currentPairingKbKeys = null;
          }
          renderDuel(root, setup, ctrl1, ctrl2);
        }, 900);
      }
    }
    if (phase !== 'done') currentPairingRaf = requestAnimationFrame(pollPair);
  };
  currentPairingRaf = requestAnimationFrame(pollPair);
}

function isControllerActive(ctrl, kbKeys) {
  if (!ctrl) return false;
  const r = ctrl.read(kbKeys);
  return r.left || r.right || r.up || r.down || r.attack;
}

function renderDuel(root, setup, ctrl1, ctrl2) {
  stopCurrentPlay();
  root.innerHTML = `
    <div class="header-bar">
      <div>
        <h1>1v1 DUEL</h1>
        <div class="subtitle">
          <span style="color:var(--accent)">${escapeHTML(setup.p1.hn)}</span>
          &nbsp;vs&nbsp;
          <span style="color:var(--accent-2)">${escapeHTML(setup.p2.hn)}</span>
          &nbsp;&middot; ${ENVIRONMENTS[setup.e].name}
        </div>
      </div>
      <div class="button-row">
        <button id="btn-back">&laquo; Setup</button>
        <button id="btn-pause">Pause</button>
        <button id="btn-fullscreen">Fullscreen</button>
      </div>
    </div>
    <div class="play-screen">
      <div class="canvas-stack">
        <canvas id="game" width="${GAME_W}" height="${GAME_H}"></canvas>
      </div>
      <div class="controls-help">
        <strong style="color:var(--accent)">${escapeHTML(setup.p1.hn)}</strong>: ${ctrl1.label}
        &nbsp;&middot;&nbsp;
        <strong style="color:var(--accent-2)">${escapeHTML(setup.p2.hn)}</strong>: ${ctrl2.label}
        <br>
        Pause: <kbd>P</kbd> &middot; Fullscreen: <kbd>F</kbd> &middot; Rematch: <kbd>R</kbd> &middot; Mute: <kbd>M</kbd>
      </div>
    </div>
  `;
  const canvas = root.querySelector('#game');
  canvas.style.filter = PALETTES[setup.p].filter;

  currentDuel = new DuelGame(canvas, setup, ctrl1, ctrl2);
  currentDuel.onPauseChange = (paused) => {
    const pb = root.querySelector('#btn-pause');
    if (pb) pb.textContent = paused ? 'Resume' : 'Pause';
  };
  currentDuel.start();

  root.querySelector('#btn-back').addEventListener('click', () => {
    stopCurrentPlay();
    renderDuelSetup(root);
  });
  root.querySelector('#btn-pause').addEventListener('click', () => {
    if (currentDuel) currentDuel.togglePause();
  });
  const btnFullscreen = root.querySelector('#btn-fullscreen');
  const canvasStack = root.querySelector('.canvas-stack');
  btnFullscreen.addEventListener('click', () => {
    if (document.fullscreenElement) document.exitFullscreen();
    else if (canvasStack.requestFullscreen) canvasStack.requestFullscreen();
  });
  currentFullscreenHandler = () => {
    btnFullscreen.textContent = document.fullscreenElement ? 'Exit fullscreen' : 'Fullscreen';
  };
  document.addEventListener('fullscreenchange', currentFullscreenHandler);
}

/* ========================================================================
   UTILITIES + ROUTER
   ======================================================================== */

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

const THEMES = ['midnight', 'arcade'];
const THEME_LABELS = { midnight: 'Midnight', arcade: 'Arcade' };

function getTheme() {
  const stored = localStorage.getItem('gm-theme');
  return THEMES.includes(stored) ? stored : 'midnight';
}

function applyTheme(name) {
  document.body.classList.remove('theme-arcade');
  if (name !== 'midnight') document.body.classList.add('theme-' + name);
  try { localStorage.setItem('gm-theme', name); } catch {}
  const btn = document.getElementById('theme-toggle');
  if (btn) btn.textContent = 'Theme: ' + THEME_LABELS[name];
}

function cycleTheme() {
  const idx = THEMES.indexOf(getTheme());
  applyTheme(THEMES[(idx + 1) % THEMES.length]);
}

function main() {
  applyTheme(getTheme());
  const tb = document.getElementById('theme-toggle');
  if (tb) tb.addEventListener('click', cycleTheme);
  const root = document.getElementById('app');
  if (isPlayMode()) {
    const state = readState();
    document.title = state.t + ' · 8-Bit Game Maker';
    renderPlay(root, state);
  } else {
    renderBuilder(root);
  }
}

main();
</script>
